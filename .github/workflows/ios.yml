# Сборка .ipa для установки на устройство (Sideloadly / повторная подпись).
# Пути: MPKDocumentsMAUI/MPKDocumentsMAUI/*.csproj (не FinanceManager из старого yaml).
name: Build iOS IPA

on:
  push:
    branches: [main, master]
    paths:
      - 'MPKDocumentsMAUI/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

env:
  DOTNET_MULTILEVEL_LOOKUP: '0'
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  MAIN_PROJ: MPKDocumentsMAUI/MPKDocumentsMAUI/MPKDocumentsMAUI.csproj
  SHARED_PROJ: MPKDocumentsMAUI/MPKDocumentsMAUI.Shared/MPKDocumentsMAUI.Shared.csproj

jobs:
  build-ios-device:
    name: iOS Release IPA (device, ad-hoc placeholder signing)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Show SDK
        run: dotnet --info

      # Пин Xcode при необходимости: см. https://github.com/maxim-lobanov/setup-xcode
      - name: Select Xcode (stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install MAUI workloads
        run: dotnet workload install maui-ios --skip-sign-check

      - name: Restore main (iOS device RID)
        run: |
          dotnet restore "$MAIN_PROJ" \
            -p:TargetFrameworks=net9.0-ios \
            -p:RuntimeIdentifier=ios-arm64

      - name: Restore Shared (last)
        run: dotnet restore "$SHARED_PROJ"

      # publish надёжнее отдаёт .ipa для Single Project MAUI
      - name: Publish IPA
        run: |
          dotnet publish "$MAIN_PROJ" \
            -f net9.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:BuildIpa=true \
            -p:CodesignKey="-" \
            -p:CodesignProvision="" \
            -p:EnableCodeSigning=false \
            --no-restore \
            --verbosity minimal

      - name: List outputs
        run: |
          echo "=== IPA / .app under bin/Release/net9.0-ios ==="
          find MPKDocumentsMAUI/MPKDocumentsMAUI/bin/Release/net9.0-ios -name "*.ipa" 2>/dev/null || true
          find MPKDocumentsMAUI/MPKDocumentsMAUI/bin/Release/net9.0-ios -name "*.app" -type d 2>/dev/null | head -30 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: MPKDocumentsMAUI-iOS-ipa
          path: |
            MPKDocumentsMAUI/MPKDocumentsMAUI/bin/Release/net9.0-ios/**/*.ipa
            MPKDocumentsMAUI/MPKDocumentsMAUI/bin/Release/net9.0-ios/**/*.app
          retention-days: 14
          if-no-files-found: warn
